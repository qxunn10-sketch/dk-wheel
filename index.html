<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍀李米米考古馆 V10.3</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f4fff6;
  padding:20px;
}

h1{
  text-align:center;
  font-size:28px;
}

/* ===== 主容器 ===== */
.container{
  max-width:900px;
  margin:0 auto;
}

/* ===== 卡片 ===== */
.card{
  background:white;
  border-radius:16px;
  padding:16px;
  margin:12px 0;
  box-shadow:0 4px 14px rgba(0,0,0,0.06);
}

/* ===== 按钮 ===== */
button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#67c587;
  color:white;
  cursor:pointer;
  margin-top:8px;
}

/* ===== 下拉 ===== */
select,input,textarea{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* ===== 抽签结果大卡（复刻重点） ===== */
.result-box{
  text-align:center;
  padding:28px;
  background:linear-gradient(135deg,#dff7e6,#f6fff6);
  border-radius:16px;
  margin-top:12px;
}

.result-title{
  font-size:26px;
  font-weight:bold;
  color:#1e5c2e;
}

.result-type{
  margin-top:6px;
  color:#666;
  font-size:14px;
}

/* ===== 记录列表 ===== */
.record-item{
  padding:10px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="container">

<h1>🍀李米米考古馆 V10.3</h1>
<p style="text-align:center;">🍕今天看什么呢？</p>

<!-- ================= 抽签模块 ================= -->
<div class="card">

<h3>🎲 抽签系统</h3>

<select id="typeFilter">
  <option value="全部">全部</option>
  <option value="舞台">舞台</option>
  <option value="综艺">综艺</option>
  <option value="直播">直播</option>
  <option value="电台">电台</option>
</select>

<button onclick="draw()">开始抽签</button>

<div class="result-box" id="result">
  等待抽签...
</div>

</div>

<!-- ================= 考古记录 ================= -->
<div class="card">

<h3>📚 考古记录</h3>

<div id="currentInfo">当前未选择物料</div>

<input id="name" placeholder="你的昵称"/>
<textarea id="thought" placeholder="感想（可选）"></textarea>

<button onclick="save()">💾 保存记录</button>

</div>

<!-- ================= 记录列表 ================= -->
<div class="card">
<h3>📖 历史记录</h3>
<div id="list"></div>
</div>

</div>

<script>

// ================= Supabase =================
const supabaseUrl = "https://rygzepjphlspdxggkftn.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5Z3plcGpwaGxzcGR4Z2drZnRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMzEyODYsImV4cCI6MjA5NjkwNzI4Nn0.5KJ3dnn1D5PNwTqDM4KfJ5cpOC645GQewL0OgVPBC3o";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= 数据 =================
let materials = [];
let current = null;

// ================= 加载物料 =================
async function loadMaterials(){
  const { data } = await client.from("materials").select("*");
  materials = data || [];
}

loadMaterials();

// ================= 抽签（带分类修复） =================
function draw(){

  let type = document.getElementById("typeFilter").value;

  let pool = materials;

  if(type !== "全部"){
    pool = materials.filter(m =>
      (m.type || "").includes(type)
    );
  }

  if(pool.length === 0){
    alert("该分类没有物料");
    return;
  }

  current = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById("result").innerHTML = `
    <div class="result-title">${current.name}</div>
    <div class="result-type">分类：${current.type}</div>
  `;

  document.getElementById("currentInfo").innerHTML =
    "当前物料：" + current.name;
}

// ================= 保存记录 =================
async function save(){

  if(!current){
    alert("请先抽签");
    return;
  }

  const name = document.getElementById("name").value;
  const thought = document.getElementById("thought").value;

  const { error } = await client.from("records").insert([{
    material_name: current.name,
    user_name: name,
    thought: thought,
    created_at: new Date().toISOString()
  }]);

  if(error){
    alert("保存失败");
    return;
  }

  alert("已记录 🍀");
  loadRecords();
}

// ================= 读取记录 =================
async function loadRecords(){

  const { data } = await client
    .from("records")
    .select("*")
    .order("created_at",{ ascending:false });

  let html = "";

  (data || []).forEach(r=>{
    html += `
      <div class="record-item">
        🎬 ${r.material_name}<br/>
        👤 ${r.user_name}<br/>
        💬 ${r.thought || ""}<br/>
        📅 ${new Date(r.created_at).toLocaleString()}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

loadRecords();

</script>

</body>
</html>
