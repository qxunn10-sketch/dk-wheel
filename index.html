<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍀李米米考古馆 V9.2.1</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family: Arial;
  background:#f6fff6;
  margin:0;
  padding:16px;
}

h1{text-align:center}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin:12px 0;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#67c587;
  color:white;
  cursor:pointer;
}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

#result{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🍀李米米考古馆 V9.2.1</h1>
<p style="text-align:center">🍕今天看什么呢？</p>

<div class="card">
<button onclick="draw()">🎲 抽签</button>
<div id="result">正在加载物料...</div>
</div>

<div class="card">
<h3>📝 添加考古记录</h3>

<input id="name" placeholder="你的昵称"/>
<textarea id="thought" placeholder="感想"></textarea>

<button onclick="save()">💾 保存记录</button>
</div>

<div class="card">
<h3>📚 考古资料卡</h3>
<div id="list"></div>
</div>

<script>

// ================== Supabase ==================
const supabaseUrl = "https://rygzepjphlspdxggkftn.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5Z3plcGpwaGxzcGR4Z2drZnRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMzEyODYsImV4cCI6MjA5NjkwNzI4Nn0.5KJ3dnn1D5PNwTqDM4KfJ5cpOC645GQewL0OgVPBC3o";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================== 状态 ==================
let materials = [];
let current = null;
let isLoaded = false;

// ================== 加载物料 ==================
async function loadMaterials() {

  try {
    const { data, error } = await client
      .from("materials")
      .select("*");

    if (error) throw error;

    materials = data || [];
    isLoaded = true;

    document.getElementById("result").innerHTML =
      "🍀 已加载 " + materials.length + " 个物料，可以抽签啦";

  } catch (err) {
    console.log(err);
    document.getElementById("result").innerHTML =
      "❌ 物料加载失败";
  }
}

loadMaterials();

// ================== 抽签 ==================
function draw() {

  if (!isLoaded || materials.length === 0) {
    alert("物料还没加载好");
    return;
  }

  current = materials[Math.floor(Math.random() * materials.length)];

  document.getElementById("result").innerHTML =
    "✨ 本次考古：" + current.name + "（" + current.type + "）";
}

// ================== 保存记录 ==================
async function save() {

  const name = document.getElementById("name").value.trim();
  const thought = document.getElementById("thought").value.trim();

  if (!current) {
    alert("请先抽签");
    return;
  }

  const { error } = await client.from("records").insert([
    {
      material_name: current.name,
      user_name: name || "匿名",
      thought: thought || "",
      created_at: new Date().toISOString()
    }
  ]);

  if (error) {
    alert("保存失败");
    return;
  }

  alert("已记录🍀");
  loadRecords();
}

// ================== 加载记录 ==================
async function loadRecords() {

  const { data } = await client
    .from("records")
    .select("*")
    .order("created_at", { ascending: false });

  let html = "";

  data.forEach(r => {
    html += `
      <div class="card">
        <b>🎬 ${r.material_name}</b><br/>
        👤 ${r.user_name}<br/>
        💬 ${r.thought}<br/>
        📅 ${new Date(r.created_at).toLocaleString()}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

loadRecords();

</script>

</body>
</html>
