<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍀李米米考古馆 V10.1</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family: Arial;
  background:#f6fff6;
  margin:0;
  padding:16px;
}

h1{text-align:center;}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin:12px 0;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#67c587;
  color:white;
  cursor:pointer;
  margin:4px;
}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

#result{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🍀李米米考古馆 V10.1</h1>
<p style="text-align:center">🍕今天看什么呢？</p>

<div class="card">
<button onclick="draw()">🎲 抽签</button>
<div id="result">等待抽签...</div>
</div>

<div class="card">
<h3>➕ 添加新物料</h3>
<input id="newName" placeholder="物料名称"/>
<input id="newType" placeholder="分类（舞台/综艺/直播等）"/>
<button onclick="addMaterial()">添加物料</button>
</div>

<div class="card">
<h3>📝 添加考古记录</h3>
<input id="name" placeholder="昵称"/>
<textarea id="thought" placeholder="感想"></textarea>
<button onclick="save()">保存记录</button>
</div>

<div class="card">
<h3>📚 考古记录</h3>
<div id="list"></div>
</div>

<script>

// ================= Supabase =================
const supabaseUrl = "https://rygzepjphlspdxggkftn.supabase.co";

// 🔥 已帮你填好 anon key
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5Z3plcGpwaGxzcGR4Z2drZnRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMzEyODYsImV4cCI6MjA5NjkwNzI4Nn0.5KJ3dnn1D5PNwTqDM4KfJ5cpOC645GQewL0OgVPBC3o";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= 数据 =================
let materials = [];
let current = null;
let used = new Set();

// ================= 加载物料 =================
async function loadMaterials(){

  const { data, error } = await client
    .from("materials")
    .select("*");

  if(error){
    alert("物料加载失败");
    return;
  }

  materials = data;
}

// ================= 抽签 =================
function draw(type = "全部"){

  if(!materials.length){
    alert("物料未加载");
    return;
  }

  let pool = materials;

  if(type !== "全部"){
    pool = materials.filter(m => m.type === type);
  }

  current = pool[Math.floor(Math.random()*pool.length)];

  const already = used.has(current.id);
  used.add(current.id);

  document.getElementById("result").innerHTML =
    "✨ 抽到：" + current.name +
    "<br/>📁 分类：" + current.type +
    (already ? "<br/>⚠️ 这个你之前抽过" : "");
}

// ================= 添加物料 =================
async function addMaterial(){

  const name = document.getElementById("newName").value;
  const type = document.getElementById("newType").value;

  if(!name || !type){
    alert("请填写完整");
    return;
  }

  const { error } = await client.from("materials").insert([
    { name, type }
  ]);

  if(error){
    alert("添加失败");
    return;
  }

  alert("添加成功");
  loadMaterials();
}

// ================= 保存记录 =================
async function save(){

  const name = document.getElementById("name").value;
  const thought = document.getElementById("thought").value;

  if(!current){
    alert("请先抽签");
    return;
  }

  const { error } = await client.from("records").insert([
    {
      material_name: current.name,
      user_name: name,
      thought: thought,
      created_at: new Date().toISOString()
    }
  ]);

  if(error){
    alert("保存失败");
    return;
  }

  alert("已保存");
  loadRecords();
}

// ================= 读取记录 =================
async function loadRecords(){

  const { data } = await client
    .from("records")
    .select("*")
    .order("created_at", { ascending:false });

  let html = "";

  data.forEach(r=>{
    html += `
      <div class="card">
        🎬 ${r.material_name}<br/>
        👤 ${r.user_name}<br/>
        💬 ${r.thought}<br/>
        📅 ${new Date(r.created_at).toLocaleString()}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// ================= 初始化 =================
loadMaterials();
loadRecords();

</script>

</body>
</html>
