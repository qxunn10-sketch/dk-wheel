<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍀李米米考古馆 V10.2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family: Arial;
  background:#f6fff6;
  margin:0;
  padding:16px;
}

h1{text-align:center;}

.container{
  display:flex;
  gap:16px;
}

.left{
  flex:2;
}

.right{
  flex:1;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin:12px 0;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#67c587;
  color:white;
  cursor:pointer;
  margin:4px;
}

input,textarea,select{
  width:100%;
  margin-top:6px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

#result{
  font-size:18px;
}
.tag{
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<h1>🍀李米米考古馆 V10.2</h1>

<div class="container">

<!-- ================= 左侧 ================= -->
<div class="left">

<div class="card">
<h3>🎲 抽签</h3>

<select id="typeFilter">
  <option value="全部">全部</option>
  <option value="舞台">舞台</option>
  <option value="综艺">综艺</option>
  <option value="直播">直播</option>
</select>

<button onclick="draw()">开始抽签</button>

<div id="result">等待抽签...</div>
</div>

<div class="card">
<h3>📚 考古记录</h3>
<div id="list"></div>
</div>

</div>

<!-- ================= 右侧 ================= -->
<div class="right">

<!-- 添加物料（移动到右侧） -->
<div class="card">
<h3>➕ 添加新物料</h3>

<input id="newName" placeholder="物料名称"/>
<select id="newType">
  <option value="舞台">舞台</option>
  <option value="综艺">综艺</option>
  <option value="直播">直播</option>
</select>

<button onclick="addMaterial()">添加</button>
</div>

<!-- 搜索 + 补感想 -->
<div class="card">
<h3>🔍 物料搜索 / 补感想</h3>

<input id="search" placeholder="搜索物料"/>

<button onclick="searchMaterial()">搜索</button>

<div id="searchResult"></div>

<textarea id="extraThought" placeholder="补充感想（可选）"></textarea>
<button onclick="saveExtra()">保存补充</button>
</div>

</div>

</div>

<script>

// ===== Supabase =====
const supabaseUrl = "https://rygzepjphlspdxggkftn.supabase.co";
const supabaseKey = "你的anon key";
const client = supabase.createClient(supabaseUrl, supabaseKey);

// ===== 数据 =====
let materials = [];
let current = null;

// ===== 加载物料 =====
async function loadMaterials(){
  const { data } = await client.from("materials").select("*");
  materials = data;
}

// ===== 抽签（分类）=====
function draw(){

  const type = document.getElementById("typeFilter").value;

  let pool = materials;

  if(type !== "全部"){
    pool = materials.filter(m => m.type === type);
  }

  if(pool.length === 0){
    alert("该分类没有物料");
    return;
  }

  current = pool[Math.floor(Math.random()*pool.length)];

  document.getElementById("result").innerHTML =
    "✨ 抽到：" + current.name +
    "<br/><span class='tag'>分类：" + current.type + "</span>" +
    "<br/>📝 已记录（如有）";
}

// ===== 添加物料 =====
async function addMaterial(){

  const name = document.getElementById("newName").value;
  const type = document.getElementById("newType").value;

  await client.from("materials").insert([{ name, type }]);

  alert("添加成功");
  loadMaterials();
}

// ===== 保存记录 =====
async function save(){

  const name = document.getElementById("name")?.value;
  const thought = document.getElementById("thought")?.value;

  await client.from("records").insert([
    {
      material_name: current.name,
      user_name: name,
      thought: thought,
      created_at: new Date().toISOString()
    }
  ]);

  loadRecords();
}

// ===== 记录列表 =====
async function loadRecords(){

  const { data } = await client
    .from("records")
    .select("*")
    .order("created_at",{ascending:false});

  let html = "";

  data.forEach(r=>{
    html += `
      <div class="card">
        🎬 ${r.material_name}<br/>
        💬 ${r.thought}<br/>
        📅 ${new Date(r.created_at).toLocaleString()}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// ===== 搜索物料 =====
function searchMaterial(){

  const key = document.getElementById("search").value;

  const res = materials.filter(m =>
    m.name.includes(key)
  );

  let html = "";

  res.forEach(m=>{
    html += `
      <div class="card">
        ${m.name}<br/>
        <span class="tag">${m.type}</span>
      </div>
    `;
  });

  document.getElementById("searchResult").innerHTML = html;
}

// ===== 补感想 =====
async function saveExtra(){

  const text = document.getElementById("extraThought").value;

  if(!current){
    alert("请先抽一个物料");
    return;
  }

  await client.from("records").insert([
    {
      material_name: current.name,
      user_name: "补充",
      thought: text,
      created_at: new Date().toISOString()
    }
  ]);

  alert("已补充记录");
  loadRecords();
}

// ===== 初始化 =====
loadMaterials();
loadRecords();

</script>

</body>
</html>
