<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍀李米米考古馆 V9.2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family: Arial;
  background:#f6fff6;
  margin:0;
  padding:16px;
}

h1{
  text-align:center;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin:12px 0;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#67c587;
  color:white;
  cursor:pointer;
}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

#result{
  font-size:20px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🍀李米米考古馆 V9.2</h1>
<p style="text-align:center">🍕今天看什么呢？</p>

<div class="card">
<button onclick="draw()">🎲 抽签</button>
<div id="result">等待抽签...</div>
</div>

<div class="card">
<h3>📝 添加考古记录</h3>

<input id="name" placeholder="你的昵称"/>
<textarea id="thought" placeholder="感想"></textarea>

<button onclick="save()">💾 保存记录</button>
</div>

<div class="card">
<h3>📚 考古资料卡</h3>
<div id="list"></div>
</div>

<script>

// ====== Supabase ======
const supabaseUrl = "https://rygzepjphlspdxggkftn.supabase.co";
const supabaseKey = "你的anon key（保留你自己的）";

const client = supabase.createClient(supabaseUrl, supabaseKey);

let currentMaterial = null;

// ====== 🎲 抽签（V9.2升级版） ======
async function draw(){

  const { data, error } = await client
    .from("materials")
    .select("*");

  if(error){
    alert("获取物料失败");
    return;
  }

  if(!data || data.length === 0){
    alert("没有物料");
    return;
  }

  const item = data[Math.floor(Math.random() * data.length)];

  currentMaterial = item;

  document.getElementById("result").innerHTML =
    "🍀 本次考古：" + item.name + "（" + item.type + "）";
}

// ====== 💾 保存记录（V9.2） ======
async function save(){

  const name = document.getElementById("name").value;
  const thought = document.getElementById("thought").value;

  if(!currentMaterial){
    alert("先抽一个物料！");
    return;
  }

  const { error } = await client.from("records").insert([{
    material_id: currentMaterial.id,
    material_name: currentMaterial.name,
    user_name: name,
    thought: thought,
    created_at: new Date().toISOString()
  }]);

  if(error){
    alert("保存失败");
    return;
  }

  document.getElementById("thought").value = "";
  load();
}

// ====== 📚 加载资料卡 ======
async function load(){

  const { data } = await client
    .from("records")
    .select("*")
    .order("created_at", { ascending: false });

  let html = "";

  data.forEach(r => {
    html += `
    <div class="card">
      <b>📦 ${r.material_name}</b><br/>
      👤 ${r.user_name}<br/>
      💬 ${r.thought}<br/>
      📅 ${new Date(r.created_at).toLocaleString()}
    </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

load();

</script>

</body>
</html>
