<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍀李米米考古馆</title>

<style>
:root{
  --bg:#f6fff6;
  --card:#ffffff;
  --line:#d7f5d7;
  --main:#67c587;
  --soft:#eaffea;
  --text:#2f2f2f;
  --muted:#666;
}

body{
  margin:0;
  padding:16px;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei";
  color:var(--text);
}

.wrap{max-width:1000px;margin:auto}

h1{text-align:center;margin:10px 0 0;font-size:34px}
.sub{text-align:center;color:var(--muted);margin-bottom:10px}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin:12px 0;
}

.row{display:flex;gap:10px;flex-wrap:wrap}

button,input,select,textarea{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  font:inherit;
}

.primary{background:var(--main);color:#fff;border:none}

#result{
  font-size:26px;
  font-weight:800;
  text-align:center;
  margin:10px 0;
}

.badge{background:var(--soft);padding:4px 8px;border-radius:999px}

.archive{
  border:1px solid var(--line);
  padding:12px;
  border-radius:12px;
  margin:10px 0;
}

.small{font-size:12px;color:var(--muted)}
</style>
</head>

<body>

<div class="wrap">

<h1>🍀李米米考古馆</h1>
<div class="sub">🍕 今天看什么呢</div>

<div class="card">
  <div class="row">
    <button onclick="draw()">🎲 抽签</button>
    <div id="result">等待抽取</div>
  </div>
</div>

<div class="card">
<h3>📅 记录</h3>

<input id="title" placeholder="物料"/>
<input id="date" type="date"/>
<input id="fans" placeholder="兼粉：林 A B"/>
<textarea id="thought" placeholder="感想"></textarea>
<br/>
<button class="primary" onclick="save()">保存记录</button>
</div>

<div class="card">
<h3>📚 资料卡</h3>
<div id="list"></div>
</div>

</div>

<script>

];

let cur=null;
let records = JSON.parse(localStorage.getItem("lm")||"[]");

function draw(){
cur = materials[Math.floor(Math.random()*materials.length)];
document.getElementById("result").innerText = cur;
document.getElementById("title").value = cur;
}

function save(){
const obj={
title:document.getElementById("title").value,
date:document.getElementById("date").value,
fans:document.getElementById("fans").value,
thought:document.getElementById("thought").value
};
records.push(obj);
localStorage.setItem("lm",JSON.stringify(records));
render();
}

function render(){
document.getElementById("list").innerHTML =
records.map(r=>
`<div class='archive'>
<b>${r.title}</b><br/>
📅 ${r.date}<br/>
👥 ${r.fans}<br/>
💬 ${r.thought}
</div>`
).join("");
}

render();

</script>

</body>
</html>
