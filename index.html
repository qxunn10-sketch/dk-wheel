<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍀李米米考古馆</title>

<style>
:root{
  --bg:#f6fff6;
  --card:#ffffff;
  --line:#d7f5d7;
  --main:#67c587;
  --soft:#eaffea;
  --text:#2f2f2f;
  --muted:#666;
}

*{box-sizing:border-box}
body{
  margin:0;
  padding:16px;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei";
  color:var(--text);
}
.wrap{max-width:1000px;margin:auto}
h1{text-align:center;margin:10px 0 0;font-size:34px}
.sub{text-align:center;color:var(--muted);margin-bottom:10px}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin:12px 0;
}

.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button,select,input,textarea{
  padding:10px;
  border-radius:12px;
  border:1px solid var(--line);
  font:inherit;
}

.primary{background:var(--main);color:#fff;border:none}
.soft{background:var(--soft)}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center}
.stat{background:var(--soft);padding:10px;border-radius:12px}

#result{font-size:26px;font-weight:800;text-align:center;margin:10px 0}
.badge{padding:4px 8px;background:var(--soft);border-radius:999px}

.archive-card{
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  margin:10px 0;
}
.small{font-size:12px;color:var(--muted)}
</style>
</head>

<body>
<div class="wrap">

<h1>🍀李米米考古馆</h1>
<div class="sub">🍕今天看什么呢</div>

<div class="card">
  <div class="stats">
    <div class="stat"><b id="total">83</b><div>总物料</div></div>
    <div class="stat"><b id="count">0</b><div>已考古</div></div>
  </div>
</div>

<div class="card">
<h2>🎲 抽签</h2>
<select id="type">
<option>全部</option>
<option>舞台/花絮</option>
<option>电台</option>
<option>综艺</option>
<option>直播</option>
</select>
<button class="primary" onclick="draw()">开始抽取</button>

<div id="result">等待抽取</div>
<button onclick="toRecord()">记录这个物料</button>
</div>

<div class="card">
<h2>📅 添加记录</h2>
<input id="title" placeholder="物料名称"/>
<input id="date" type="date"/>
<input id="fans" placeholder="兼粉：林 A B"/>
<textarea id="thought" placeholder="感想"></textarea>
<button class="primary" onclick="save()">保存</button>
</div>

<div class="card">
<h2>📚 资料卡</h2>
<div id="list"></div>
</div>

</div>

<script>

];

let cur=null;
let records=[];

function draw(){
 const type=document.getElementById('type').value;
 const pool=materials.filter(m=>type==="全部"||m.type===type);
 cur=pool[Math.floor(Math.random()*pool.length)];
 document.getElementById('result').innerText=cur.t;
}

function toRecord(){
 if(!cur)return;
 document.getElementById('title').value=cur.t;
}

function save(){
 const obj={
  title:document.getElementById('title').value,
  date:document.getElementById('date').value,
  fans:document.getElementById('fans').value,
  thought:document.getElementById('thought').value
 };
 records.push(obj);
 render();
}

function render(){
 document.getElementById('list').innerHTML =
 records.map(r=>
 `<div class='archive-card'>
 <b>${r.title}</b><br/>
 📅${r.date}<br/>
 👥${r.fans}<br/>
 💬${r.thought}
 </div>`
 ).join('');
}

</script>

</body>
</html>
