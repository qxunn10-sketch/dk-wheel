<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍀李米米考古馆 V10</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f5fff6;
}

.container{
  display:flex;
  gap:12px;
  padding:16px;
}

.left,.right{
  flex:1;
}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

button{
  background:#67c587;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  margin:4px;
}

input,textarea{
  width:100%;
  padding:8px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ddd;
}

#result{
  font-size:18px;
  margin-top:10px;
}

.tag{
  display:inline-block;
  padding:3px 8px;
  background:#e8f7ea;
  border-radius:8px;
  margin-left:6px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<!-- ================= 左侧 ================= -->
<div class="left">

<h2>🍀考古抽签</h2>

<div class="card">
<button onclick="draw('全部')">🎲 全部</button>
<button onclick="draw('舞台/花絮')">🎭 舞台</button>
<button onclick="draw('电台')">📻 电台</button>
<button onclick="draw('综艺')">📺 综艺</button>
<button onclick="draw('直播')">📡 直播</button>

<div id="result">等待抽签...</div>
</div>

<div class="card">
<h3>📝 添加考古记录</h3>
<input id="name" placeholder="昵称"/>
<textarea id="thought" placeholder="感想"></textarea>
<button onclick="save()">💾 保存</button>
</div>

<div class="card">
<h3>📚 考古记录</h3>
<div id="records"></div>
</div>

</div>

<!-- ================= 右侧 ================= -->
<div class="right">

<h2>📦 物料库</h2>

<div class="card">
<input id="search" placeholder="搜索物料..." oninput="renderMaterials()"/>
</div>

<div class="card">
<div id="materials"></div>
</div>

</div>

</div>

<script>

// ================= Supabase =================
const supabaseUrl = "https://rygzepjphlspdxggkftn.supabase.co";
const supabaseKey = "你的anon key";
const client = supabase.createClient(supabaseUrl, supabaseKey);

// ================= 数据 =================
let materials = [];
let current = null;
let used = new Set();

// ================= 加载物料 =================
async function loadMaterials(){

  const { data } = await client
    .from("materials")
    .select("*");

  materials = data || [];
  renderMaterials();
}

loadMaterials();

// ================= 渲染物料 =================
function renderMaterials(){

  const key = document.getElementById("search").value || "";

  let list = materials.filter(m =>
    m.name.includes(key)
  );

  let html = "";

  list.forEach(m=>{
    html += `
      <div class="card">
        🎬 ${m.name}
        <span class="tag">${m.type}</span><br/>
        <button onclick="selectMaterial('${m.id}')">选择</button>
      </div>
    `;
  });

  document.getElementById("materials").innerHTML = html;
}

// ================= 选择物料 =================
function selectMaterial(id){
  current = materials.find(m=>m.id === id);

  document.getElementById("result").innerHTML =
    "📌 当前：" + current.name +
    "<br/>📁 " + current.type;
}

// ================= 抽签 =================
function draw(type){

  let pool = materials;

  if(type !== "全部"){
    pool = materials.filter(m => m.type === type);
  }

  pool = pool.filter(m => !used.has(m.id));

  if(pool.length === 0){
    alert("这个分类已经抽完了！");
    return;
  }

  current = pool[Math.floor(Math.random()*pool.length)];
  used.add(current.id);

  document.getElementById("result").innerHTML =
    "✨ 抽到：" + current.name +
    "<br/>📁 " + current.type;
}

// ================= 保存记录 =================
async function save(){

  const name = document.getElementById("name").value;
  const thought = document.getElementById("thought").value;

  if(!current){
    alert("先选/抽一个物料");
    return;
  }

  await client.from("records").insert([
    {
      material_name: current.name,
      user_name: name || "匿名",
      thought: thought || "",
      created_at: new Date().toISOString()
    }
  ]);

  loadRecords();
  alert("已保存🍀");
}

// ================= 加载记录 =================
async function loadRecords(){

  const { data } = await client
    .from("records")
    .select("*")
    .order("created_at",{ascending:false});

  let html = "";

  data.forEach(r=>{
    html += `
      <div class="card">
        🎬 ${r.material_name}<br/>
        👤 ${r.user_name}<br/>
        💬 ${r.thought}<br/>
        📅 ${new Date(r.created_at).toLocaleString()}
      </div>
    `;
  });

  document.getElementById("records").innerHTML = html;
}

loadRecords();

</script>

</body>
</html>
